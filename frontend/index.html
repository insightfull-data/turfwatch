<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TurfWatch — Neighborhood Intelligence</title>
  <meta name="description" content="Competitive intelligence radar for your barbershop" />
  <meta name="theme-color" content="#060710" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TurfWatch" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060710; overflow-x: hidden; }
    #root { min-height: 100vh; }
    #loader {
      position: fixed; inset: 0; background: #060710;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif; color: #6e7088; gap: 16px; z-index: 9999;
    }
    #loader .brand { font-size: 24px; font-weight: 900; color: #e2bc48; }
    #loader .sub { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }
    #loader .spinner {
      width: 28px; height: 28px; border: 3px solid #1b1e30;
      border-top-color: #c9a035; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="loader">
    <div class="brand">📡 TurfWatch</div>
    <div class="sub">Loading intelligence radar...</div>
    <div class="spinner"></div>
  </div>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <script type="text/babel" data-type="module" src="app.jsx"></script>
  <script type="text/babel">
    const checkAndRender = setInterval(() => {
      if (window.TurfWatchApp) {
        clearInterval(checkAndRender);
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.TurfWatchApp));
        document.getElementById('loader').style.display = 'none';
      }
    }, 100);
    setTimeout(() => clearInterval(checkAndRender), 15000);
  </script>
</body>
</html>
